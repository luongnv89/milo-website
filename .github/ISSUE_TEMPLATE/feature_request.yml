name: 💡 Feature request
description: Suggest a new model, shortcut, or capability for MILO.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make MILO better? Pitch it here.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that MILO can't do well today?
      placeholder: When I'm driving, I'd like…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Describe the feature
      description: What should MILO do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've thought about.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, links, or examples are welcome.
    validations:
      required: false
